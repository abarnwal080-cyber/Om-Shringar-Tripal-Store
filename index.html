    <!-- Script to handle brand logo carousel cycling and smart transition timeout -->
    <script>
      (function() {
        var startTime = Date.now();
        var isPageLoaded = false;
        
        // Partner logos carousel logic
        var currentBrand = 0;
        var brandItems = document.querySelectorAll('.preloader-partner-item');
        var carouselInterval;
        
        if (brandItems.length > 0) {
          carouselInterval = setInterval(function() {
            brandItems[currentBrand].classList.remove('active');
            currentBrand = (currentBrand + 1) % brandItems.length;
            brandItems[currentBrand].classList.add('active');
          }, 1800);
        }

        // Action to trigger preloader fade out and complete DOM removal
        function hidePreloader() {
          var preloader = document.getElementById('premium-preloader');
          if (preloader) {
            preloader.classList.add('fade-out');
            if (carouselInterval) clearInterval(carouselInterval);
            
            // Clean up from DOM once transition completes
            setTimeout(function() {
              preloader.remove();
            }, 600);
          }
        }

        // Logic to coordinate load event and 4.5s timer
        function checkAndHide() {
          var elapsedTime = Date.now() - startTime;
          var minDuration = 4500; // Keep showing for at least 4500ms
          
          if (elapsedTime >= minDuration) {
            hidePreloader();
          } else {
            setTimeout(hidePreloader, minDuration - elapsedTime);
          }
        }

        // Normal full load completion
        window.addEventListener('load', function() {
          isPageLoaded = true;
          checkAndHide();
        });

        // Fail-safe backup trigger (maximum 8 seconds load delay safeguard)
        setTimeout(function() {
          if (!isPageLoaded) {
            hidePreloader();
          }
        }, 8000);
      })();
    </script>
